<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="Google review screenshot placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect x="90" y="80" width="1020" height="740" rx="42" fill="#ffffff" stroke="#d6d3d1" stroke-width="4"/>
  <rect x="90" y="80" width="1020" height="96" rx="42" fill="#f8fafc"/>
  <circle cx="170" cy="128" r="24" fill="#34a853"/>
  <circle cx="214" cy="128" r="24" fill="#4285f4"/>
  <circle cx="258" cy="128" r="24" fill="#fbbc05"/>
  <circle cx="302" cy="128" r="24" fill="#ea4335"/>
  <text x="360" y="140" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#1f2937">Google Review</text>
  <text x="170" y="250" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700" fill="#111827">Amila Perera</text>
  <text x="170" y="308" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#6b7280">5.0 stars · Verified customer</text>
  <text x="170" y="410" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#374151">Excellent concrete pillar quality.</text>
  <text x="170" y="462" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#374151">Very heavy and structurally strong.</text>
  <text x="170" y="514" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#374151">Transparent pricing and fast support.</text>
  <rect x="170" y="610" width="860" height="116" rx="26" fill="#f3f4f6"/>
  <text x="208" y="666" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#4b5563">Screenshot-style review card for the website</text>
  <text x="208" y="708" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#6b7280">Replace this file with the actual Google review screenshot when ready.</text>
</svg>
