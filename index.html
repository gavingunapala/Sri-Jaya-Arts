<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRI JAYA ARTS Business - Simple & Elegant Shrines</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --rich-gold: #C9961A;
            --deep-gold: #A87400;
            --light-gold: #DDB45A;
            --dark-brown: #2E1C10;
            --warm-brown: #4A2D19;
            --ivory-white: #F8F4EE;
            --soft-gray: #EEE8DF;
            --hero-bg: #2E1C10;
            --footer-bg: #24150B;
            --footer-text: #E8E0D4;
            --primary-text: #3A2413;
            --secondary-text: #6B5644;
            --icon-gold: #DDB45A;
        }

        body {
            font-family: 'Inter', sans-serif;
        }

        .bg-ivory {
            background-color: var(--ivory-white) !important;
        }

        .text-gold {
            color: var(--rich-gold) !important;
        }

        .bg-primary {
            background-color: var(--rich-gold) !important;
        }

        .bg-primary-hover:hover {
            background-color: var(--deep-gold) !important;
        }

        .text-dark {
            color: var(--dark-brown) !important;
        }

        .border-primary {
            border-color: var(--rich-gold) !important;
        }

        .bg-darkbrown {
            background-color: var(--dark-brown) !important;
        }

        .text-softgray {
            color: var(--soft-gray) !important;
        }

        .bg-hero {
            background-color: var(--hero-bg) !important;
        }

        .text-ivory {
            color: var(--ivory-white) !important;
        }

        .bg-footer {
            background-color: var(--footer-bg) !important;
        }

        .text-footer {
            color: var(--footer-text) !important;
        }

        .text-icon-gold {
            color: var(--icon-gold) !important;
        }
    </style>
</head>

<body class="bg-stone-50 text-stone-800 scroll-smooth">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
